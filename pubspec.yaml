name: finzo
description: "Finzo - A fully offline personal finance management app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path: ^1.9.0
  provider: ^6.1.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  path_provider: ^2.1.5
  file_picker: ^8.3.7
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/laucher_icon_img/F.png"

flutter:
  uses-material-design: true
